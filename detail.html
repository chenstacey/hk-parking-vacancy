<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#2563eb">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>停車場詳情</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="app.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style id="shared-style"></style>
  <style>
    #mini-map { height: 160px; border-radius: 0; }
    .leaflet-control-attribution { font-size: 8px; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <header class="bg-white border-b border-gray-100 sticky top-0 z-10">
    <div class="max-w-md mx-auto px-4 py-3 flex items-center gap-3">
      <a href="javascript:history.back()" class="text-blue-500 text-lg leading-none py-1 pr-1">‹</a>
      <div class="flex-1 min-w-0">
        <h1 id="park-name" class="text-base font-bold text-gray-900 leading-tight truncate"></h1>
        <p id="park-address" class="text-xs text-gray-400 mt-0.5 truncate"></p>
      </div>
      <div class="flex items-center gap-2 shrink-0">
        <div id="lang-toggle"></div>
        <button id="fav-btn" onclick="onToggleFav()"
          class="text-2xl leading-none py-1 px-1 active:scale-90 transition-transform">☆</button>
        <div id="status-badge" class="flex items-center gap-1.5 bg-gray-100 text-gray-400 text-xs font-medium px-2.5 py-1.5 rounded-full">
          <span class="w-1.5 h-1.5 rounded-full bg-gray-300"></span>
          <span id="txt-status"></span>
        </div>
      </div>
    </div>
    <div class="h-0.5 bg-gray-100">
      <div id="countdown-bar" class="h-full bg-blue-400 transition-none" style="width:100%"></div>
    </div>
  </header>

  <main class="max-w-md mx-auto px-4 py-4 space-y-3">

    <div class="flex items-center justify-between">
      <p class="text-xs text-gray-400" id="last-update"></p>
      <button id="refresh-btn" onclick="manualRefresh()"
        class="flex items-center gap-1 text-xs text-blue-500 active:text-blue-700 font-medium py-1 px-2 -mr-2">
        <span id="refresh-icon" class="text-sm leading-none">↻</span>
        <span id="txt-refresh-now"></span>
      </button>
    </div>

    <div id="loading" class="space-y-3">
      <div class="bg-white rounded-2xl shadow-sm p-5">
        <div class="h-4 bg-gray-100 rounded-md w-20 mb-3 animate-pulse"></div>
        <div class="h-10 bg-gray-100 rounded-md w-24 animate-pulse"></div>
      </div>
      <div class="bg-white rounded-2xl shadow-sm p-5">
        <div class="h-4 bg-gray-100 rounded-md w-16 mb-3 animate-pulse"></div>
        <div class="h-10 bg-gray-100 rounded-md w-20 animate-pulse"></div>
      </div>
    </div>

    <div id="error" class="hidden bg-red-50 border border-red-100 rounded-2xl p-5 text-center">
      <p class="text-2xl mb-2">📡</p>
      <p id="txt-load-error" class="text-sm font-semibold text-red-700"></p>
      <p id="txt-error-hint" class="text-xs text-red-400 mt-1"></p>
    </div>

    <div id="vacancy-cards" class="hidden space-y-3"></div>

    <div id="rates-card" class="hidden bg-white rounded-2xl shadow-sm p-4">
      <h3 id="txt-rates" class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3"></h3>
      <div id="rates-content" class="text-sm text-gray-500"></div>
    </div>

    <div id="info-card" class="hidden bg-white rounded-2xl shadow-sm p-4 space-y-2">
      <h3 id="txt-carpark-info" class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1"></h3>
      <div id="info-content" class="text-sm text-gray-600 space-y-1.5"></div>
    </div>

    <!-- Mini map -->
    <div id="mini-map-card" class="hidden bg-white rounded-2xl shadow-sm overflow-hidden">
      <div id="mini-map"></div>
      <div class="flex items-center justify-between px-4 py-2.5">
        <a id="mini-map-link" href="map.html" class="flex items-center gap-1.5 text-xs text-blue-500 font-medium active:opacity-70">
          <span>◎</span><span id="txt-open-map"></span>
        </a>
        <div id="nav-btn"></div>
      </div>
    </div>

    <p id="txt-footer" class="text-center text-xs text-gray-300 pb-6"></p>
  </main>

  <div id="tab-bar"></div>

  <script>
    document.getElementById('shared-style').textContent = SHARED_STYLE;
    document.getElementById('tab-bar').innerHTML = renderTabBar('');
    document.getElementById('lang-toggle').innerHTML = renderLangToggle();

    // Static i18n
    document.getElementById('txt-status').textContent      = t('loadingStatus');
    document.getElementById('last-update').textContent     = t('loading');
    document.getElementById('txt-refresh-now').textContent = t('refreshNow');
    document.getElementById('txt-load-error').textContent  = t('loadError');
    document.getElementById('txt-error-hint').textContent  = t('checkNetwork') + '，' + t('autoRefresh').toLowerCase();
    document.getElementById('txt-rates').textContent        = t('rates');
    document.getElementById('txt-carpark-info').textContent = t('carparkInfo');
    document.getElementById('txt-footer').innerHTML         = t('dataSource') + '<br>' + t('autoRefresh');
    document.getElementById('fav-btn').title                = t('favourite');
    document.getElementById('txt-open-map').textContent     = t('openMap');

    const parkId = new URLSearchParams(location.search).get('id');
    if (!parkId) location.href = 'list.html';

    const VACANCY_SINGLE_URL = `https://resource.data.one.gov.hk/td/carpark/vacancy_${parkId}.json`;
    const INFO_SINGLE_URL    = `https://resource.data.one.gov.hk/td/carpark/basic_info_${parkId}.json`;

    let lastSuccessTime = null;
    let countdownRAF    = null;
    let countdownStart  = null;
    let autoTimer       = null;

    async function loadInfo() {
      try {
        const res  = await fetch(INFO_SINGLE_URL, { cache: 'default' });
        if (!res.ok) return;
        const json = await res.json();
        const park = (json.car_park || [])[0] || json;
        renderInfo(park);
      } catch (_) {}
    }

    function renderInfo(park) {
      document.getElementById('park-name').textContent    = parkName(park) || parkId;
      document.getElementById('park-address').textContent = parkAddress(park) || '';

      const badge  = document.getElementById('status-badge');
      const isOpen = park.opening_status === 'OPEN';
      badge.className = `flex items-center gap-1.5 text-xs font-medium px-2.5 py-1.5 rounded-full ${isOpen ? 'bg-green-50 text-green-700' : 'bg-gray-100 text-gray-400'}`;
      badge.innerHTML = `<span class="w-1.5 h-1.5 rounded-full ${isOpen ? 'bg-green-500 pulse-dot' : 'bg-gray-300'}"></span><span>${isOpen ? t('openStatus') : t('closedStatus')}</span>`;

      const remark = parkRemark(park);
      if (remark) {
        document.getElementById('rates-card').classList.remove('hidden');
        document.getElementById('rates-content').innerHTML =
          remark.split(/\n|;/).map(l => l.trim()).filter(Boolean)
            .map(l => `<p class="text-gray-600 leading-relaxed">${l}</p>`).join('');
      }

      const lines = [];
      const distVal = parkDistrict(park);
      if (distVal) lines.push(`<span class="text-gray-400">${t('district')}</span>　${distVal}`);
      if (park.contactNo)
        lines.push(`<span class="text-gray-400">${t('phone')}</span>　<a href="tel:${park.contactNo}" class="text-blue-500">${park.contactNo}</a>`);
      if (park.website_en || park.website_tc) {
        const url = park.website_en || park.website_tc;
        lines.push(`<span class="text-gray-400">${t('website')}</span>　<a href="${url}" target="_blank" class="text-blue-500 truncate block">${url}</a>`);
      }
      if (park.height && park.height > 0)
        lines.push(`<span class="text-gray-400">${t('heightLimit')}</span>　${park.height}m`);
      if (lines.length) {
        document.getElementById('info-card').classList.remove('hidden');
        document.getElementById('info-content').innerHTML = lines.map(l => `<p>${l}</p>`).join('');
      }

      // Mini map
      const lat = parseFloat(park.latitude);
      const lng = parseFloat(park.longitude);
      if (lat && lng) {
        const card = document.getElementById('mini-map-card');
        card.classList.remove('hidden');
        // Link to full map page centred on this park
        document.getElementById('mini-map-link').href = `map.html?lat=${lat}&lng=${lng}`;
        document.getElementById('nav-btn').innerHTML = renderNavButton(lat, lng);
        // Init Leaflet (only once)
        if (!window._miniMapInit) {
          window._miniMapInit = true;
          const miniMap = L.map('mini-map', {
            center: [lat, lng], zoom: 16,
            zoomControl: false, dragging: false,
            touchZoom: false, doubleClickZoom: false,
            scrollWheelZoom: false, boxZoom: false, keyboard: false,
          });
          L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap', maxZoom: 19,
          }).addTo(miniMap);
          L.circleMarker([lat, lng], {
            radius: 10, fillColor: '#3b82f6', color: 'white',
            weight: 2.5, fillOpacity: 1,
          }).addTo(miniMap);
          // Ensure tiles render correctly
          setTimeout(() => miniMap.invalidateSize(), 100);
        }
      }
    }

    function startCountdown() {
      if (countdownRAF) cancelAnimationFrame(countdownRAF);
      countdownStart = performance.now();
      const bar = document.getElementById('countdown-bar');
      function tick(now) {
        const pct = Math.max(0, 100 - ((now - countdownStart) / REFRESH_MS) * 100);
        bar.style.width = pct + '%';
        if (pct > 0) countdownRAF = requestAnimationFrame(tick);
      }
      countdownRAF = requestAnimationFrame(tick);
    }

    function renderCards(parkData) {
      const container = document.getElementById('vacancy-cards');
      const types = (parkData.vehicle_type || []).filter(vt =>
        (vt.service_category || []).some(sc => sc.category === 'HOURLY')
      );

      if (types.length === 0) {
        container.innerHTML = `<p class="text-center text-gray-400 text-sm py-6">${t('noVacancyData')}</p>`;
        return;
      }

      let latestUpdate = null;
      const html = types.map(vt => {
        const label  = vehicleLabel(vt.type);
        const hourly = vt.service_category.find(sc => sc.category === 'HOURLY');
        const style  = vacancyStyle(hourly.vacancy, hourly.vacancy_type);
        if (hourly.lastupdate && !latestUpdate) latestUpdate = hourly.lastupdate;

        const isClosed    = hourly.vacancy_type === 'C' || hourly.vacancy < 0;
        const isEstimated = hourly.vacancy_type === 'B';
        const numDisplay  = isClosed ? '—' : String(hourly.vacancy);
        const evLine  = (!isClosed && hourly.vacancyEV  > 0) ? `<p class="text-xs text-gray-400 mt-1.5">${t('evSpaces')(hourly.vacancyEV)}</p>` : '';
        const disLine = (!isClosed && hourly.vacancyDIS > 0) ? `<p class="text-xs text-gray-400 mt-0.5">${t('disSpaces')(hourly.vacancyDIS)}</p>` : '';
        const estNote = isEstimated ? `<span class="text-xs text-gray-300 ml-1">${t('estimated')}</span>` : '';

        return `
          <div class="fade-in ${style.bg} rounded-2xl p-5 border border-white">
            <div class="flex items-center justify-between mb-3">
              <span class="text-sm font-semibold text-gray-700">${label}${estNote}</span>
              <span class="text-xs font-medium px-2.5 py-1 rounded-full ${style.badge}">${style.label}</span>
            </div>
            <div class="flex items-end gap-1.5">
              <span class="text-5xl font-bold leading-none ${style.num}">${numDisplay}</span>
              ${isClosed ? '' : `<span class="text-sm text-gray-400 mb-1.5">${t('spaces')}</span>`}
            </div>
            ${evLine}${disLine}
          </div>`;
      }).join('');

      container.innerHTML = html;
      if (latestUpdate) {
        lastSuccessTime = latestUpdate;
        document.getElementById('last-update').textContent = t('lastUpdated')(formatHKTime(latestUpdate));
      }
    }

    async function fetchVacancy() {
      try {
        const res  = await fetch(VACANCY_SINGLE_URL, { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();
        const parks    = json.car_park || [];
        const parkData = parks.find(p => p.park_id === parkId) || parks[0];
        if (!parkData) throw new Error('no data');

        document.getElementById('loading').classList.add('hidden');
        document.getElementById('error').classList.add('hidden');
        document.getElementById('vacancy-cards').classList.remove('hidden');
        renderCards(parkData);
        startCountdown();
      } catch (err) {
        console.error('[detail] fetch failed:', err);
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('vacancy-cards').classList.add('hidden');
        document.getElementById('error').classList.remove('hidden');
        document.getElementById('last-update').textContent =
          lastSuccessTime ? t('lastSuccess')(formatHKTime(lastSuccessTime)) : t('noConnection');
      }
    }

    function manualRefresh() {
      const btn  = document.getElementById('refresh-btn');
      const icon = document.getElementById('refresh-icon');
      if (btn.disabled) return;
      btn.disabled = true;
      icon.classList.add('spinning');
      clearInterval(autoTimer);
      fetchVacancy().finally(() => {
        btn.disabled = false;
        icon.classList.remove('spinning');
        autoTimer = setInterval(fetchVacancy, REFRESH_MS);
      });
    }

    function updateFavBtn() {
      const btn = document.getElementById('fav-btn');
      btn.textContent = isFavourite(parkId) ? '★' : '☆';
      btn.style.color = isFavourite(parkId) ? '#f59e0b' : '#d1d5db';
    }

    function onToggleFav() {
      toggleFavourite(parkId);
      updateFavBtn();
    }

    updateFavBtn();
    loadInfo();
    fetchVacancy();
    autoTimer = setInterval(fetchVacancy, REFRESH_MS);
  </script>
</body>
</html>
