<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>停車場詳情</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="app.js"></script>
  <style id="shared-style"></style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Header -->
  <header class="bg-white border-b border-gray-100 sticky top-0 z-10">
    <div class="max-w-md mx-auto px-4 py-3 flex items-center gap-3">
      <a href="javascript:history.back()" class="text-blue-500 text-lg leading-none py-1 pr-1">‹</a>
      <div class="flex-1 min-w-0">
        <h1 id="park-name" class="text-base font-bold text-gray-900 leading-tight truncate">載入中…</h1>
        <p id="park-address" class="text-xs text-gray-400 mt-0.5 truncate"></p>
      </div>
      <div id="status-badge" class="shrink-0 flex items-center gap-1.5 bg-gray-100 text-gray-400 text-xs font-medium px-2.5 py-1.5 rounded-full">
        <span class="w-1.5 h-1.5 rounded-full bg-gray-300"></span>
        <span>載入中</span>
      </div>
    </div>
    <!-- Countdown bar -->
    <div class="h-0.5 bg-gray-100">
      <div id="countdown-bar" class="h-full bg-blue-400 transition-none" style="width:100%"></div>
    </div>
  </header>

  <main class="max-w-md mx-auto px-4 py-4 space-y-3">

    <!-- Last update row -->
    <div class="flex items-center justify-between">
      <p class="text-xs text-gray-400" id="last-update">載入中…</p>
      <button id="refresh-btn" onclick="manualRefresh()"
        class="flex items-center gap-1 text-xs text-blue-500 active:text-blue-700 font-medium py-1 px-2 -mr-2">
        <span id="refresh-icon" class="text-sm leading-none">↻</span>
        立即更新
      </button>
    </div>

    <!-- Loading skeleton -->
    <div id="loading" class="space-y-3">
      <div class="bg-white rounded-2xl shadow-sm p-5">
        <div class="h-4 bg-gray-100 rounded-md w-20 mb-3 animate-pulse"></div>
        <div class="h-10 bg-gray-100 rounded-md w-24 animate-pulse"></div>
      </div>
      <div class="bg-white rounded-2xl shadow-sm p-5">
        <div class="h-4 bg-gray-100 rounded-md w-16 mb-3 animate-pulse"></div>
        <div class="h-10 bg-gray-100 rounded-md w-20 animate-pulse"></div>
      </div>
    </div>

    <!-- Error state -->
    <div id="error" class="hidden bg-red-50 border border-red-100 rounded-2xl p-5 text-center">
      <p class="text-2xl mb-2">📡</p>
      <p class="text-sm font-semibold text-red-700">無法獲取數據</p>
      <p class="text-xs text-red-400 mt-1">請檢查網絡連接，稍後將自動重試</p>
    </div>

    <!-- Vacancy cards -->
    <div id="vacancy-cards" class="hidden space-y-3"></div>

    <!-- Rates card -->
    <div id="rates-card" class="hidden bg-white rounded-2xl shadow-sm p-4">
      <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">收費資訊</h3>
      <div id="rates-content" class="text-sm text-gray-500"></div>
    </div>

    <!-- Info card -->
    <div id="info-card" class="hidden bg-white rounded-2xl shadow-sm p-4 space-y-2">
      <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">停車場資訊</h3>
      <div id="info-content" class="text-sm text-gray-600 space-y-1.5"></div>
    </div>

    <!-- Footer -->
    <p class="text-center text-xs text-gray-300 pb-6">
      數據來源：香港運輸署開放數據<br>每60秒自動更新
    </p>
  </main>

  <div id="tab-bar"></div>

  <script>
    document.getElementById('shared-style').textContent = SHARED_STYLE;
    document.getElementById('tab-bar').innerHTML = renderTabBar('');

    const parkId = new URLSearchParams(location.search).get('id');
    if (!parkId) location.href = 'list.html';

    const VACANCY_SINGLE_URL = `https://resource.data.one.gov.hk/td/carpark/vacancy_${parkId}.json`;
    const INFO_SINGLE_URL    = `https://resource.data.one.gov.hk/td/carpark/basic_info_${parkId}.json`;

    let lastSuccessTime = null;
    let countdownRAF    = null;
    let countdownStart  = null;
    let autoTimer       = null;

    // ── Load static info once ──────────────────────────────────────────────
    async function loadInfo() {
      try {
        const res  = await fetch(INFO_SINGLE_URL, { cache: 'default' });
        if (!res.ok) return;
        const json = await res.json();
        const park = (json.car_park || [])[0] || json;
        renderInfo(park);
      } catch (_) {}
    }

    function renderInfo(park) {
      // Header
      document.getElementById('park-name').textContent    = park.name_tc || park.name_en || parkId;
      document.getElementById('park-address').textContent = park.displayAddress_tc || park.displayAddress_en || '';

      // Status badge
      const badge = document.getElementById('status-badge');
      const isOpen = park.opening_status === 'OPEN';
      badge.className = `shrink-0 flex items-center gap-1.5 text-xs font-medium px-2.5 py-1.5 rounded-full ${isOpen ? 'bg-green-50 text-green-700' : 'bg-gray-100 text-gray-400'}`;
      badge.innerHTML = `<span class="w-1.5 h-1.5 rounded-full ${isOpen ? 'bg-green-500 pulse-dot' : 'bg-gray-300'}"></span><span>${isOpen ? '開放中' : '已關閉'}</span>`;

      // Rates from remark
      const remark = park.remark_tc || park.remark_en || '';
      if (remark) {
        document.getElementById('rates-card').classList.remove('hidden');
        document.getElementById('rates-content').innerHTML =
          remark.split(/\n|;/).map(line => line.trim()).filter(Boolean)
            .map(line => `<p class="text-gray-600 leading-relaxed">${line}</p>`).join('');
      }

      // Info
      const lines = [];
      if (park.district_tc || park.district_en)
        lines.push(`<span class="text-gray-400">地區</span>　${park.district_tc || park.district_en}`);
      if (park.contactNo)
        lines.push(`<span class="text-gray-400">電話</span>　<a href="tel:${park.contactNo}" class="text-blue-500">${park.contactNo}</a>`);
      if (park.website_tc || park.website_en) {
        const url = park.website_tc || park.website_en;
        lines.push(`<span class="text-gray-400">網站</span>　<a href="${url}" target="_blank" class="text-blue-500 truncate block">${url}</a>`);
      }
      if (park.height && park.height > 0)
        lines.push(`<span class="text-gray-400">車高限制</span>　${park.height}m`);
      if (lines.length) {
        document.getElementById('info-card').classList.remove('hidden');
        document.getElementById('info-content').innerHTML = lines.map(l => `<p>${l}</p>`).join('');
      }
    }

    // ── Countdown bar ─────────────────────────────────────────────────────
    function startCountdown() {
      if (countdownRAF) cancelAnimationFrame(countdownRAF);
      countdownStart = performance.now();
      const bar = document.getElementById('countdown-bar');
      function tick(now) {
        const pct = Math.max(0, 100 - ((now - countdownStart) / REFRESH_MS) * 100);
        bar.style.width = pct + '%';
        if (pct > 0) countdownRAF = requestAnimationFrame(tick);
      }
      countdownRAF = requestAnimationFrame(tick);
    }

    // ── Render vacancy cards ───────────────────────────────────────────────
    function renderCards(parkData) {
      const container = document.getElementById('vacancy-cards');
      const types = (parkData.vehicle_type || []).filter(vt =>
        (vt.service_category || []).some(sc => sc.category === 'HOURLY')
      );

      if (types.length === 0) {
        container.innerHTML = '<p class="text-center text-gray-400 text-sm py-6">暫無空位資料</p>';
        return;
      }

      let latestUpdate = null;
      const html = types.map(vt => {
        const label  = VEHICLE_LABELS[vt.type] || vt.type;
        const hourly = vt.service_category.find(sc => sc.category === 'HOURLY');
        const style  = vacancyStyle(hourly.vacancy, hourly.vacancy_type);
        if (hourly.lastupdate && !latestUpdate) latestUpdate = hourly.lastupdate;

        const isClosed    = hourly.vacancy_type === 'C' || hourly.vacancy < 0;
        const isEstimated = hourly.vacancy_type === 'B';
        const numDisplay  = isClosed ? '—' : String(hourly.vacancy);
        const evLine  = (!isClosed && hourly.vacancyEV  > 0) ? `<p class="text-xs text-gray-400 mt-1.5">⚡ 電動車充電位　${hourly.vacancyEV} 個</p>` : '';
        const disLine = (!isClosed && hourly.vacancyDIS > 0) ? `<p class="text-xs text-gray-400 mt-0.5">♿ 殘障車位　${hourly.vacancyDIS} 個</p>` : '';
        const estNote = isEstimated ? '<span class="text-xs text-gray-300 ml-1">(估算)</span>' : '';

        return `
          <div class="fade-in ${style.bg} rounded-2xl p-5 border border-white">
            <div class="flex items-center justify-between mb-3">
              <span class="text-sm font-semibold text-gray-700">${label}${estNote}</span>
              <span class="text-xs font-medium px-2.5 py-1 rounded-full ${style.badge}">${style.label}</span>
            </div>
            <div class="flex items-end gap-1.5">
              <span class="text-5xl font-bold leading-none ${style.num}">${numDisplay}</span>
              ${isClosed ? '' : '<span class="text-sm text-gray-400 mb-1.5">個空位</span>'}
            </div>
            ${evLine}${disLine}
          </div>`;
      }).join('');

      container.innerHTML = html;
      if (latestUpdate) {
        lastSuccessTime = latestUpdate;
        document.getElementById('last-update').textContent = `最後更新：${formatHKTime(latestUpdate)}`;
      }
    }

    // ── Fetch vacancy ─────────────────────────────────────────────────────
    async function fetchVacancy() {
      try {
        const res  = await fetch(VACANCY_SINGLE_URL, { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();
        const parks = json.car_park || [];
        const parkData = parks.find(p => p.park_id === parkId) || parks[0];
        if (!parkData) throw new Error('no data');

        document.getElementById('loading').classList.add('hidden');
        document.getElementById('error').classList.add('hidden');
        document.getElementById('vacancy-cards').classList.remove('hidden');
        renderCards(parkData);
        startCountdown();
      } catch (err) {
        console.error('[detail] fetch failed:', err);
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('vacancy-cards').classList.add('hidden');
        document.getElementById('error').classList.remove('hidden');
        document.getElementById('last-update').textContent =
          lastSuccessTime ? `上次成功：${formatHKTime(lastSuccessTime)}` : '無法連線';
      }
    }

    // ── Manual refresh ────────────────────────────────────────────────────
    function manualRefresh() {
      const btn  = document.getElementById('refresh-btn');
      const icon = document.getElementById('refresh-icon');
      if (btn.disabled) return;
      btn.disabled = true;
      icon.classList.add('spinning');
      clearInterval(autoTimer);
      fetchVacancy().finally(() => {
        btn.disabled = false;
        icon.classList.remove('spinning');
        autoTimer = setInterval(fetchVacancy, REFRESH_MS);
      });
    }

    // ── Boot ──────────────────────────────────────────────────────────────
    loadInfo();
    fetchVacancy();
    autoTimer = setInterval(fetchVacancy, REFRESH_MS);
  </script>
</body>
</html>
