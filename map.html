<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>停車場地圖</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="app.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style id="shared-style"></style>
  <style>
    html, body { height: 100%; margin: 0; }

    #map {
      position: fixed;
      top: var(--header-h, 96px);
      left: 0; right: 0;
      bottom: 64px; /* tab bar */
    }

    /* Leaflet popup tweaks for mobile */
    .leaflet-popup-content-wrapper {
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      padding: 0;
      overflow: hidden;
    }
    .leaflet-popup-content {
      margin: 0;
      min-width: 180px;
    }
    .leaflet-popup-tip-container { margin-top: -1px; }

    /* Vacancy dot markers */
    .cp-marker {
      border: 2.5px solid white;
      border-radius: 50%;
      box-shadow: 0 2px 6px rgba(0,0,0,0.25);
      cursor: pointer;
    }

    /* Region filter chips scroll */
    .no-scrollbar { scrollbar-width: none; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="bg-gray-50">

  <!-- Header -->
  <header id="header" class="bg-white border-b border-gray-100 fixed top-0 left-0 right-0 z-[1000]">
    <div class="max-w-2xl mx-auto px-4 pt-3 pb-0">
      <div class="flex items-center justify-between mb-2">
        <h1 id="txt-map-title" class="text-base font-bold text-gray-900"></h1>
        <div id="lang-toggle"></div>
      </div>
    </div>
    <!-- Region filter -->
    <div class="max-w-2xl mx-auto flex gap-0 border-b border-gray-100" id="region-tabs">
      <!-- built by JS -->
    </div>
  </header>

  <!-- Map container -->
  <div id="map"></div>

  <!-- Loading overlay -->
  <div id="map-loading"
    class="fixed z-[999] bg-white/80 backdrop-blur-sm flex flex-col items-center justify-center gap-3"
    style="top:var(--header-h,96px); left:0; right:0; bottom:64px;">
    <div class="w-8 h-8 border-2 border-blue-400 border-t-transparent rounded-full spinning"></div>
    <p id="txt-map-loading" class="text-sm text-gray-500"></p>
  </div>

  <!-- Error overlay -->
  <div id="map-error" class="hidden fixed z-[999] bg-white flex flex-col items-center justify-center gap-3"
    style="top:var(--header-h,96px); left:0; right:0; bottom:64px;">
    <p class="text-3xl">📡</p>
    <p id="txt-map-error" class="text-sm font-semibold text-red-600"></p>
    <button onclick="loadMapData()" class="text-xs text-red-500 border border-red-200 rounded-lg px-4 py-1.5">
      <span id="txt-retry"></span>
    </button>
  </div>

  <!-- Vacancy legend -->
  <div id="legend"
    class="hidden fixed z-[999] bg-white/90 backdrop-blur-sm rounded-2xl shadow-sm px-3 py-2 flex items-center gap-3"
    style="bottom: 76px; left: 50%; transform: translateX(-50%); white-space: nowrap;">
    <span class="flex items-center gap-1 text-xs text-gray-600">
      <span class="w-3 h-3 rounded-full bg-green-500 inline-block"></span>充裕</span>
    <span class="flex items-center gap-1 text-xs text-gray-600">
      <span class="w-3 h-3 rounded-full bg-yellow-400 inline-block"></span>有限</span>
    <span class="flex items-center gap-1 text-xs text-gray-600">
      <span class="w-3 h-3 rounded-full bg-orange-400 inline-block"></span>極少</span>
    <span class="flex items-center gap-1 text-xs text-gray-600">
      <span class="w-3 h-3 rounded-full bg-red-500 inline-block"></span>滿位</span>
    <span class="flex items-center gap-1 text-xs text-gray-600">
      <span class="w-3 h-3 rounded-full bg-gray-300 inline-block"></span>關閉</span>
  </div>

  <div id="tab-bar"></div>

  <script>
    document.getElementById('shared-style').textContent = SHARED_STYLE;
    document.getElementById('tab-bar').innerHTML = renderTabBar('map');
    document.getElementById('lang-toggle').innerHTML = renderLangToggle();

    // i18n
    document.getElementById('txt-map-title').textContent   = t('mapView');
    document.getElementById('txt-map-loading').textContent = t('mapLoading');
    document.getElementById('txt-map-error').textContent   = t('mapError');
    document.getElementById('txt-retry').textContent       = t('retry');

    // ── Adjust map top based on actual header height ──────────────────────
    function applyHeaderHeight() {
      const h = document.getElementById('header').offsetHeight;
      document.documentElement.style.setProperty('--header-h', h + 'px');
    }
    applyHeaderHeight();

    // ── Region tabs ───────────────────────────────────────────────────────
    let selectedRegion = ''; // '' = all
    const regionTabsEl = document.getElementById('region-tabs');

    // "全部" first
    const allTab = document.createElement('button');
    allTab.dataset.region = '';
    allTab.className = 'region-tab flex-1 text-xs font-semibold py-2 border-b-2 border-blue-500 text-blue-500';
    allTab.textContent = t('all');
    allTab.onclick = () => selectRegion(allTab);
    regionTabsEl.appendChild(allTab);

    REGIONS.forEach(r => {
      const btn = document.createElement('button');
      btn.dataset.region = r.id;
      btn.className = 'region-tab flex-1 text-xs font-semibold py-2 border-b-2 border-transparent text-gray-400';
      btn.textContent = t(r.id);
      btn.onclick = () => selectRegion(btn);
      regionTabsEl.appendChild(btn);
    });

    function selectRegion(btn) {
      selectedRegion = btn.dataset.region;
      document.querySelectorAll('.region-tab').forEach(b => {
        b.className = `region-tab flex-1 text-xs font-semibold py-2 border-b-2 ${b === btn ? 'border-blue-500 text-blue-500' : 'border-transparent text-gray-400'}`;
      });
      applyRegionFilter();
    }

    function applyRegionFilter() {
      const districts = getRegionDistricts(selectedRegion); // null = all
      Object.entries(markerMap).forEach(([parkId, { marker, park }]) => {
        const inRegion = !districts || districts.includes(park.district_en);
        if (inRegion) marker.addTo(map);
        else map.removeLayer(marker);
      });
      // Fly to region bounds if filtered
      if (selectedRegion) {
        const visible = Object.values(markerMap)
          .filter(({ park }) => getRegionDistricts(selectedRegion)?.includes(park.district_en))
          .map(({ marker }) => marker.getLatLng());
        if (visible.length) {
          const bounds = L.latLngBounds(visible);
          map.flyToBounds(bounds, { padding: [40, 40], duration: 0.8 });
        }
      }
    }

    // ── Leaflet map init ──────────────────────────────────────────────────
    const map = L.map('map', {
      center: [22.3193, 114.1694],
      zoom: 12,
      zoomControl: false,
    });

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      maxZoom: 19,
    }).addTo(map);

    // Move zoom control to top-right (away from header)
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    // ── State ─────────────────────────────────────────────────────────────
    // markerMap: { [parkId]: { marker: L.CircleMarker, park: info, vacancy: v } }
    const markerMap = {};
    let vacancyTimer = null;

    // ── Dot color from vacancy ────────────────────────────────────────────
    function dotColor(v) {
      if (!v || v.vacancy_type === 'C' || v.vacancy < 0) return '#9ca3af'; // gray
      if (v.vacancy === 0)  return '#ef4444'; // red
      if (v.vacancy < 5)   return '#f97316'; // orange
      if (v.vacancy <= 20) return '#facc15'; // yellow
      return '#22c55e'; // green
    }

    // ── Popup HTML ────────────────────────────────────────────────────────
    function popupHtml(park, v) {
      const name    = parkName(park);
      const address = parkAddress(park);
      const isClosed = !v || v.vacancy_type === 'C' || v.vacancy < 0;
      const vacNum   = isClosed ? '—' : v.vacancy;
      const style    = v ? vacancyStyle(v.vacancy, v.vacancy_type) : null;
      const badgeClass = style ? style.badge : 'bg-gray-100 text-gray-400';
      const numClass   = style ? style.num   : 'text-gray-300';
      const label      = style ? style.label : t('closed');
      const spacesStr  = isClosed ? '' : (getLang() === 'en' ? ` ${t('spaces')}` : `${t('spaces')}`);

      return `
        <div style="min-width:190px; font-family:-apple-system,sans-serif;">
          <div style="padding:12px 14px 10px">
            <p style="font-size:13px;font-weight:700;color:#111;margin:0 0 2px;line-height:1.3">${name}</p>
            <p style="font-size:11px;color:#9ca3af;margin:0">${address}</p>
          </div>
          <div style="padding:0 14px 10px;display:flex;align-items:center;justify-content:space-between">
            <div>
              <span style="font-size:28px;font-weight:800;line-height:1" class="${numClass}">${vacNum}</span>
              <span style="font-size:11px;color:#9ca3af;margin-left:2px">${spacesStr}</span>
            </div>
            <span style="font-size:11px;font-weight:600;padding:3px 10px;border-radius:999px" class="${badgeClass}">${label}</span>
          </div>
          <div style="padding:0 14px 12px">
            <a href="detail.html?id=${park.park_id}"
              style="display:block;text-align:center;background:#3b82f6;color:white;border-radius:10px;padding:7px;font-size:12px;font-weight:600;text-decoration:none">
              ${t('viewDetails')}
            </a>
          </div>
        </div>`;
    }

    // ── Create / update markers ────────────────────────────────────────────
    function buildMarkers(allInfo, allVacancy) {
      allInfo.forEach(park => {
        const lat = parseFloat(park.latitude);
        const lng = parseFloat(park.longitude);
        if (!lat || !lng) return;

        const v     = getParkVacancy(park.park_id, allVacancy);
        const color = dotColor(v);

        if (markerMap[park.park_id]) {
          // Update existing marker color & popup
          const { marker } = markerMap[park.park_id];
          marker.setStyle({ fillColor: color, color });
          marker.setPopupContent(popupHtml(park, v));
          markerMap[park.park_id].vacancy = v;
        } else {
          // Create new CircleMarker
          const marker = L.circleMarker([lat, lng], {
            radius: 9,
            fillColor: color,
            color: color,
            weight: 0,
            fillOpacity: 1,
            className: 'cp-marker',
          }).addTo(map);

          marker.bindPopup(popupHtml(park, v), {
            maxWidth: 240,
            minWidth: 190,
            closeButton: false,
            offset: [0, -6],
          });

          markerMap[park.park_id] = { marker, park, vacancy: v };
        }
      });
    }

    // ── Load data ─────────────────────────────────────────────────────────
    async function loadMapData() {
      document.getElementById('map-loading').style.display = 'flex';
      document.getElementById('map-error').classList.add('hidden');

      try {
        const [infoJson, vacJson] = await Promise.all([fetchAllInfo(), fetchAllVacancy()]);
        const allInfo = infoJson.car_park || [];

        buildMarkers(allInfo, vacJson);

        document.getElementById('map-loading').style.display = 'none';
        document.getElementById('legend').classList.remove('hidden');

        applyRegionFilter();

        // Start vacancy refresh
        clearInterval(vacancyTimer);
        vacancyTimer = setInterval(async () => {
          try {
            const vac = await fetchAllVacancy();
            Object.values(markerMap).forEach(({ marker, park }) => {
              const v     = getParkVacancy(park.park_id, vac);
              const color = dotColor(v);
              marker.setStyle({ fillColor: color, color });
              marker.setPopupContent(popupHtml(park, v));
            });
          } catch (_) {}
        }, REFRESH_MS);

      } catch (err) {
        console.error('[map] load failed:', err);
        document.getElementById('map-loading').style.display = 'none';
        document.getElementById('map-error').classList.remove('hidden');
      }
    }

    loadMapData();
  </script>
</body>
</html>
