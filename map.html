<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#2563eb">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>停車場地圖</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="app.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style id="shared-style"></style>
  <style>
    html, body { height: 100%; margin: 0; }
    #map {
      position: fixed;
      top: var(--header-h, 120px);
      left: 0; right: 0; bottom: 64px;
    }
    .leaflet-popup-content-wrapper {
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      padding: 0; overflow: hidden;
    }
    .leaflet-popup-content { margin: 0; min-width: 190px; }
    .leaflet-popup-tip-container { margin-top: -1px; }
    .leaflet-control-attribution { font-size: 9px; }
  </style>
</head>
<body class="bg-gray-50">

  <!-- Header -->
  <header id="header" class="bg-white border-b border-gray-100 fixed top-0 left-0 right-0 z-[1000]">
    <div class="max-w-2xl mx-auto px-4 pt-3 pb-2">
      <div class="flex items-center justify-between mb-2">
        <h1 id="txt-map-title" class="text-base font-bold text-gray-900"></h1>
        <div id="lang-toggle"></div>
      </div>
      <!-- Search box -->
      <div id="search-wrapper" class="relative">
        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-300 text-sm pointer-events-none">🔍</span>
        <input id="addr-input" type="search" autocomplete="off"
          class="w-full bg-gray-50 border border-gray-200 rounded-xl pl-8 pr-8 py-2 text-sm outline-none focus:border-blue-300 focus:bg-white transition-colors">
        <button id="search-clear" onclick="clearSearch()"
          class="hidden absolute right-3 top-1/2 -translate-y-1/2 text-gray-300 text-xl leading-none">×</button>
        <div id="addr-dropdown"
          class="hidden absolute left-0 right-0 top-full mt-1 bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden z-[2000]">
        </div>
      </div>
    </div>
    <p id="map-hint" class="text-center text-xs text-gray-300 pb-1"></p>
    <!-- Region tabs + layer toggle -->
    <div class="max-w-2xl mx-auto flex items-stretch">
      <div id="region-tabs" class="flex flex-1"></div>
      <div class="flex items-center pr-4 gap-1 border-b border-gray-100">
        <button id="btn-carparks" onclick="toggleLayer('carparks')"
          class="text-[10px] font-semibold px-2 py-1 rounded-lg bg-blue-500 text-white transition-colors">🅿️</button>
        <button id="btn-meters" onclick="toggleLayer('meters')"
          class="text-[10px] font-semibold px-2 py-1 rounded-lg bg-gray-100 text-gray-500 transition-colors">🅼</button>
      </div>
    </div>
  </header>

  <div id="map"></div>

  <!-- Loading overlay -->
  <div id="map-loading" class="fixed z-[999] bg-white/80 backdrop-blur-sm flex flex-col items-center justify-center gap-3"
    style="top:var(--header-h,120px);left:0;right:0;bottom:64px;">
    <div class="w-8 h-8 border-2 border-blue-400 border-t-transparent rounded-full spinning"></div>
    <p id="txt-map-loading" class="text-sm text-gray-500"></p>
  </div>

  <!-- Error overlay -->
  <div id="map-error" class="hidden fixed z-[999] bg-white flex flex-col items-center justify-center gap-3"
    style="top:var(--header-h,120px);left:0;right:0;bottom:64px;">
    <p class="text-3xl">📡</p>
    <p id="txt-map-error" class="text-sm font-semibold text-red-600"></p>
    <button onclick="loadMapData()" id="txt-retry" class="text-xs text-red-500 border border-red-200 rounded-lg px-4 py-1.5"></button>
  </div>

  <!-- Toast -->
  <div id="search-toast" class="hidden fixed z-[1001] left-1/2 -translate-x-1/2 bg-gray-800/90 text-white text-xs rounded-full px-4 py-2"
    style="top:calc(var(--header-h,120px) + 12px)"></div>

  <!-- Legend -->
  <div id="legend" class="hidden fixed z-[999] bg-white/90 backdrop-blur-sm rounded-2xl shadow-sm px-3 py-2"
    style="bottom:76px;left:50%;transform:translateX(-50%);white-space:nowrap;">
    <div id="legend-carparks" class="flex items-center gap-3">
      <span class="flex items-center gap-1 text-xs text-gray-600"><span class="w-3 h-3 rounded-full bg-green-500 inline-block"></span>充裕</span>
      <span class="flex items-center gap-1 text-xs text-gray-600"><span class="w-3 h-3 rounded-full bg-yellow-400 inline-block"></span>有限</span>
      <span class="flex items-center gap-1 text-xs text-gray-600"><span class="w-3 h-3 rounded-full bg-orange-400 inline-block"></span>極少</span>
      <span class="flex items-center gap-1 text-xs text-gray-600"><span class="w-3 h-3 rounded-full bg-red-500 inline-block"></span>滿位</span>
      <span class="flex items-center gap-1 text-xs text-gray-600"><span class="w-3 h-3 rounded-full bg-gray-300 inline-block"></span>關閉</span>
    </div>
    <div id="legend-meters" class="hidden flex items-center gap-3 mt-1">
      <span class="flex items-center gap-1 text-xs text-gray-600"><span class="w-2.5 h-2.5 rounded-full bg-green-400 inline-block"></span>空置</span>
      <span class="flex items-center gap-1 text-xs text-gray-600"><span class="w-2.5 h-2.5 rounded-full bg-red-400 inline-block"></span>已泊</span>
      <span class="flex items-center gap-1 text-xs text-gray-600"><span class="w-2.5 h-2.5 rounded-full bg-gray-300 inline-block"></span>停用</span>
    </div>
  </div>

  <div id="tab-bar"></div>

  <script>
    document.getElementById('shared-style').textContent = SHARED_STYLE;
    document.getElementById('tab-bar').innerHTML = renderTabBar('map');
    document.getElementById('lang-toggle').innerHTML = renderLangToggle();
    document.getElementById('txt-map-title').textContent   = t('mapView');
    document.getElementById('txt-map-loading').textContent = t('mapLoading');
    document.getElementById('txt-map-error').textContent   = t('mapError');
    document.getElementById('txt-retry').textContent       = t('retry');
    document.getElementById('addr-input').placeholder      = t('searchAddressPlaceholder');
    document.getElementById('map-hint').textContent        = getLang() === 'en' ? 'Long-press map to drop a pin' : '長按地圖可放置定位點';

    function applyHeaderHeight() {
      const h = document.getElementById('header').offsetHeight;
      document.documentElement.style.setProperty('--header-h', h + 'px');
    }
    applyHeaderHeight();

    // ── Leaflet map ───────────────────────────────────────────────────────
    const urlParams = new URLSearchParams(location.search);
    const initLat   = parseFloat(urlParams.get('lat')) || 22.3193;
    const initLng   = parseFloat(urlParams.get('lng')) || 114.1694;
    const initZoom  = urlParams.get('lat') ? 16 : 12;

    const map = L.map('map', { center: [initLat, initLng], zoom: initZoom, zoomControl: false });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>', maxZoom: 19,
    }).addTo(map);
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    const meterLayer = L.layerGroup().addTo(map);
    const markerMap  = {};
    let vacancyTimer = null;
    let searchPin    = null;
    let customPin    = null;
    let allMeters    = null;
    let showCarparks = true;
    let showMeters   = false;

    // ── Long-press to drop a custom pin ───────────────────────────────────
    let longPressTimer = null;
    map.on('mousedown touchstart', e => {
      longPressTimer = setTimeout(() => {
        const latlng = e.latlng || (e.touches && map.mouseEventToLatLng(e.touches[0]));
        if (!latlng) return;
        dropCustomPin(latlng.lat, latlng.lng);
      }, 600);
    });
    map.on('mouseup mousemove touchend touchmove', () => clearTimeout(longPressTimer));

    function dropCustomPin(lat, lng) {
      if (customPin) map.removeLayer(customPin);
      customPin = L.marker([lat, lng], {
        icon: L.divIcon({
          html: `<div style="width:16px;height:16px;background:#ef4444;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.3)"></div>`,
          className: '', iconSize: [16, 16], iconAnchor: [8, 16],
        }), zIndexOffset: 999,
      }).addTo(map);

      const label = getLang() === 'en' ? 'Custom Pin' : '自訂位置';
      const removeLabel = getLang() === 'en' ? 'Remove' : '移除';
      customPin.bindPopup(`
        <div style="font-family:-apple-system,sans-serif;min-width:170px">
          <p style="font-size:13px;font-weight:700;color:#111;margin:0 0 4px;padding:12px 14px 0">${label}</p>
          <p style="font-size:11px;color:#9ca3af;margin:0 0 10px;padding:0 14px">${lat.toFixed(5)}, ${lng.toFixed(5)}</p>
          <div style="padding:0 14px 12px;display:flex;gap:8px">
            <button onclick="showNavPicker(${lat},${lng})" style="flex:1;background:#3b82f6;color:white;border:none;border-radius:10px;padding:7px;font-size:12px;font-weight:600;cursor:pointer">${getLang()==='en'?'Navigate':'導航'}</button>
            <button onclick="if(customPin){map.removeLayer(customPin);customPin=null;}" style="flex:1;background:#f3f4f6;color:#6b7280;border:none;border-radius:10px;padding:7px;font-size:12px;font-weight:600;cursor:pointer">${removeLabel}</button>
          </div>
        </div>`, { closeButton: false, offset: [0, -10] }
      ).openPopup();
    }

    // ── Region tabs ───────────────────────────────────────────────────────
    let selectedRegion = '';
    const regionTabsEl = document.getElementById('region-tabs');
    [{ id: '', label: t('all') }, ...REGIONS.map(r => ({ id: r.id, label: t(r.id) }))].forEach((r, i) => {
      const btn = document.createElement('button');
      btn.dataset.region = r.id;
      btn.className = `region-tab flex-1 text-xs font-semibold py-2 border-b-2 ${i === 0 ? 'border-blue-500 text-blue-500' : 'border-transparent text-gray-400'}`;
      btn.textContent = r.label;
      btn.onclick = () => {
        selectedRegion = r.id;
        document.querySelectorAll('.region-tab').forEach(b => {
          b.className = `region-tab flex-1 text-xs font-semibold py-2 border-b-2 ${b === btn ? 'border-blue-500 text-blue-500' : 'border-transparent text-gray-400'}`;
        });
        applyRegionFilter();
      };
      regionTabsEl.appendChild(btn);
    });

    function applyRegionFilter() {
      const districts = getRegionDistricts(selectedRegion);
      Object.values(markerMap).forEach(({ marker, park }) => {
        const show = !districts || districts.includes(park.district_en);
        if (show) marker.addTo(map); else map.removeLayer(marker);
      });
      if (selectedRegion) {
        const pts = Object.values(markerMap)
          .filter(({ park }) => getRegionDistricts(selectedRegion)?.includes(park.district_en))
          .map(({ marker }) => marker.getLatLng());
        if (pts.length) map.flyToBounds(L.latLngBounds(pts), { padding: [40, 40], duration: 0.8 });
      }
    }

    // ── Layer toggle ──────────────────────────────────────────────────────
    async function toggleLayer(layer) {
      if (layer === 'carparks') {
        showCarparks = !showCarparks;
        document.getElementById('btn-carparks').className =
          `text-[10px] font-semibold px-2 py-1 rounded-lg transition-colors ${showCarparks ? 'bg-blue-500 text-white' : 'bg-gray-100 text-gray-500'}`;
        Object.values(markerMap).forEach(({ marker }) => {
          if (showCarparks) marker.addTo(map); else map.removeLayer(marker);
        });
        document.getElementById('legend-carparks').classList.toggle('hidden', !showCarparks);
      } else {
        showMeters = !showMeters;
        document.getElementById('btn-meters').className =
          `text-[10px] font-semibold px-2 py-1 rounded-lg transition-colors ${showMeters ? 'bg-green-500 text-white' : 'bg-gray-100 text-gray-500'}`;
        document.getElementById('legend-meters').classList.toggle('hidden', !showMeters);
        if (showMeters) {
          // Use current map centre if no search pin
          const c = map.getCenter();
          if (!allMeters) {
            showToast(t('loadingMeters'));
            allMeters = await fetchMeters();
            hideToast();
          }
          showMeterLayer(c.lat, c.lng);
        } else {
          meterLayer.clearLayers();
        }
      }
    }

    // ── Dot colours ───────────────────────────────────────────────────────
    function dotColor(v) {
      if (!v || v.vacancy_type === 'C' || v.vacancy < 0) return '#9ca3af';
      if (v.vacancy === 0)  return '#ef4444';
      if (v.vacancy < 5)   return '#f97316';
      if (v.vacancy <= 20) return '#facc15';
      return '#22c55e';
    }
    function meterDotColor(m) {
      if (!m.meterOk)       return '#d1d5db';
      if (m.status === 'V') return '#4ade80';
      if (m.status === 'O') return '#f87171';
      return '#d1d5db';
    }

    // ── Carpark popup ─────────────────────────────────────────────────────
    function carparkPopupHtml(park, v, lat, lng) {
      const isClosed   = !v || v.vacancy_type === 'C' || v.vacancy < 0;
      const style      = v ? vacancyStyle(v.vacancy, v.vacancy_type) : null;
      const badgeClass = style ? style.badge : 'bg-gray-100 text-gray-400';
      const numClass   = style ? style.num   : 'text-gray-300';
      const label      = style ? style.label : t('closed');
      return `
        <div style="min-width:190px;font-family:-apple-system,sans-serif;">
          <div style="padding:12px 14px 8px">
            <p style="font-size:13px;font-weight:700;color:#111;margin:0 0 2px;line-height:1.3">${parkName(park)}</p>
            <p style="font-size:11px;color:#9ca3af;margin:0">${parkAddress(park)}</p>
          </div>
          <div style="padding:0 14px 8px;display:flex;align-items:center;justify-content:space-between">
            <div>
              <span style="font-size:26px;font-weight:800;line-height:1" class="${numClass}">${isClosed ? '—' : v.vacancy}</span>
              <span style="font-size:11px;color:#9ca3af;margin-left:2px">${isClosed ? '' : t('spaces')}</span>
            </div>
            <span style="font-size:11px;font-weight:600;padding:3px 10px;border-radius:999px" class="${badgeClass}">${label}</span>
          </div>
          <div style="padding:0 14px 12px;display:flex;gap:8px">
            <a href="detail.html?id=${park.park_id}" style="flex:1;text-align:center;background:#3b82f6;color:white;border-radius:10px;padding:7px;font-size:12px;font-weight:600;text-decoration:none">${t('viewDetails')}</a>
            <button onclick="showNavPicker(${lat},${lng})" style="flex:1;text-align:center;background:#f3f4f6;color:#374151;border:none;border-radius:10px;padding:7px;font-size:12px;font-weight:600;cursor:pointer">${getLang() === 'en' ? 'Navigate' : '導航'}</button>
          </div>
        </div>`;
    }

    // ── Build carpark markers ─────────────────────────────────────────────
    function buildMarkers(allInfo, allVacancy) {
      allInfo.forEach(park => {
        const lat = parseFloat(park.latitude), lng = parseFloat(park.longitude);
        if (!lat || !lng) return;
        const v = getParkVacancy(park.park_id, allVacancy), color = dotColor(v);
        if (markerMap[park.park_id]) {
          markerMap[park.park_id].marker.setStyle({ fillColor: color, color });
          markerMap[park.park_id].marker.setPopupContent(carparkPopupHtml(park, v, lat, lng));
        } else {
          const marker = L.circleMarker([lat, lng], {
            radius: 9, fillColor: color, color, weight: 0, fillOpacity: 1,
          }).addTo(map);
          marker.bindPopup(carparkPopupHtml(park, v, lat, lng), { maxWidth: 240, minWidth: 190, closeButton: false, offset: [0, -6] });
          markerMap[park.park_id] = { marker, park };
        }
      });
    }

    // ── Meter layer ───────────────────────────────────────────────────────
    function showMeterLayer(lat, lng, radiusKm = 0.8) {
      meterLayer.clearLayers();
      if (!allMeters) return;
      allMeters.forEach(m => {
        if (distanceKm(lat, lng, m.lat, m.lng) > radiusKm) return;
        const color = meterDotColor(m);
        const statusLabel = !m.meterOk ? t('meterOff') : m.status === 'V' ? t('meterVacant') : m.status === 'O' ? t('meterOccupied') : '—';
        const bg    = !m.meterOk ? '#f3f4f6' : m.status === 'V' ? '#dcfce7' : '#fee2e2';
        const fg    = !m.meterOk ? '#9ca3af' : m.status === 'V' ? '#15803d'  : '#dc2626';
        const mk    = L.circleMarker([m.lat, m.lng], { radius: 5, fillColor: color, color: 'white', weight: 1, fillOpacity: 0.9 });
        mk.bindPopup(`
          <div style="font-family:-apple-system,sans-serif;padding:10px 14px;min-width:150px">
            <p style="font-size:12px;font-weight:700;color:#111;margin:0 0 3px">${m.street || '—'}</p>
            <p style="font-size:11px;color:#9ca3af;margin:0 0 8px">${m.district || ''}</p>
            <span style="font-size:11px;font-weight:600;padding:3px 10px;border-radius:999px;background:${bg};color:${fg}">${statusLabel}</span>
          </div>`, { closeButton: false, maxWidth: 200 });
        meterLayer.addLayer(mk);
      });
    }

    // ── HK GeoData locationSearch (free, no key, building names + addresses) ─
    // Returns HK1980 grid coords (EPSG:2326); convert to WGS84 with linear approx
    // Accuracy ~50m — sufficient for locating nearby carparks/meters
    function hk1980toWGS84(x, y) {
      const lat = (y - 819069.8) / 111300  + 22.31213;
      const lng = (x - 836694.05) / 103014 + 114.17856;
      return { lat, lng };
    }

    let lastResults   = [];
    let debounceTimer = null;

    function initSearch() {
      const input = document.getElementById('addr-input');

      input.addEventListener('input', () => {
        const q = input.value.trim();
        document.getElementById('search-clear').classList.toggle('hidden', !q);
        clearTimeout(debounceTimer);
        if (q.length < 2) { hideDropdown(); return; }
        debounceTimer = setTimeout(() => fetchSuggestions(q), 300);
      });

      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
          clearTimeout(debounceTimer);
          hideDropdown();
          if (lastResults.length) selectResult(0);
          else fetchSuggestions(input.value.trim(), true);
        }
        if (e.key === 'Escape') { hideDropdown(); input.blur(); }
      });

      document.addEventListener('click', e => {
        if (!e.target.closest('#search-wrapper')) hideDropdown();
      });
    }

    async function fetchSuggestions(query, autoSelect = false) {
      try {
        const url = `https://geodata.gov.hk/gs/api/v1.0.0/locationSearch?q=${encodeURIComponent(query)}`;
        const res = await fetch(url);
        const arr = await res.json();
        lastResults = (arr || []).filter(r => r.x && r.y).slice(0, 7);
        if (!lastResults.length) { hideDropdown(); if (autoSelect) showToast(t('noAddressResult'), 3000); return; }
        if (autoSelect) { selectResult(0); return; }

        const dd = document.getElementById('addr-dropdown');
        dd.innerHTML = lastResults.map((r, i) => {
          const main = getLang() === 'en' ? (r.nameEN || r.addressEN) : (r.nameZH || r.addressZH);
          const sub  = getLang() === 'en' ? (r.addressEN || '') : (r.addressZH || '');
          return `<div onclick="selectResult(${i})"
            style="padding:11px 16px;border-bottom:1px solid #f9fafb;cursor:pointer"
            ontouchstart="this.style.background='#eff6ff'" ontouchend="this.style.background=''">
            <p style="font-size:13px;font-weight:600;color:#111;margin:0 0 2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${main}</p>
            <p style="font-size:11px;color:#9ca3af;margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${sub}</p>
          </div>`;
        }).join('');
        dd.classList.remove('hidden');
      } catch (err) {
        console.error('[geodata] suggest failed:', err);
      }
    }

    function selectResult(i) {
      const r = lastResults[i];
      if (!r) return;
      const { lat, lng } = hk1980toWGS84(r.x, r.y);
      const name = getLang() === 'en' ? (r.nameEN || r.addressEN) : (r.nameZH || r.addressZH);
      document.getElementById('addr-input').value = name;
      document.getElementById('search-clear').classList.remove('hidden');
      hideDropdown();
      flyToAndShowMeters(lat, lng);
    }

    function hideDropdown() { document.getElementById('addr-dropdown').classList.add('hidden'); }

    async function flyToAndShowMeters(lat, lng) {
      if (searchPin) map.removeLayer(searchPin);
      searchPin = L.marker([lat, lng], {
        icon: L.divIcon({
          html: `<div style="width:14px;height:14px;background:#3b82f6;border-radius:50%;border:3px solid white;box-shadow:0 2px 8px rgba(59,130,246,0.5)"></div>`,
          className: '', iconSize: [14, 14], iconAnchor: [7, 7],
        }), zIndexOffset: 1000,
      }).addTo(map);
      map.flyTo([lat, lng], 16, { duration: 1 });
      hideToast();

      if (!allMeters) {
        showToast(t('loadingMeters'));
        allMeters = await fetchMeters();
        hideToast();
      }
      // Auto-enable meter layer
      showMeters = true;
      document.getElementById('btn-meters').className =
        'text-[10px] font-semibold px-2 py-1 rounded-lg transition-colors bg-green-500 text-white';
      document.getElementById('legend-meters').classList.remove('hidden');
      showMeterLayer(lat, lng);
    }

    function clearSearch() {
      document.getElementById('addr-input').value = '';
      document.getElementById('search-clear').classList.add('hidden');
      hideDropdown();
      if (searchPin) { map.removeLayer(searchPin); searchPin = null; }
      meterLayer.clearLayers();
      showMeters = false;
      document.getElementById('btn-meters').className =
        'text-[10px] font-semibold px-2 py-1 rounded-lg transition-colors bg-gray-100 text-gray-500';
      document.getElementById('legend-meters').classList.add('hidden');
    }

    // ── Toast ─────────────────────────────────────────────────────────────
    let toastTimer = null;
    function showToast(msg, ms = 0) {
      const el = document.getElementById('search-toast');
      el.textContent = msg; el.classList.remove('hidden');
      clearTimeout(toastTimer);
      if (ms) toastTimer = setTimeout(hideToast, ms);
    }
    function hideToast() { document.getElementById('search-toast').classList.add('hidden'); }

    // ── Load carpark data ─────────────────────────────────────────────────
    async function loadMapData() {
      document.getElementById('map-loading').style.display = 'flex';
      document.getElementById('map-error').classList.add('hidden');
      try {
        const [infoJson, vacJson] = await Promise.all([fetchAllInfo(), fetchAllVacancy()]);
        buildMarkers(infoJson.car_park || [], vacJson);
        document.getElementById('map-loading').style.display = 'none';
        document.getElementById('legend').classList.remove('hidden');
        applyRegionFilter();

        if (urlParams.get('lat')) {
          const lat = parseFloat(urlParams.get('lat')), lng = parseFloat(urlParams.get('lng'));
          searchPin = L.marker([lat, lng], {
            icon: L.divIcon({
              html: `<div style="width:14px;height:14px;background:#3b82f6;border-radius:50%;border:3px solid white;box-shadow:0 2px 8px rgba(59,130,246,0.5)"></div>`,
              className: '', iconSize: [14, 14], iconAnchor: [7, 7],
            }), zIndexOffset: 1000,
          }).addTo(map);
        }

        clearInterval(vacancyTimer);
        vacancyTimer = setInterval(async () => {
          try {
            const vac = await fetchAllVacancy();
            Object.values(markerMap).forEach(({ marker, park }) => {
              const v = getParkVacancy(park.park_id, vac), color = dotColor(v);
              const ll = marker.getLatLng();
              marker.setStyle({ fillColor: color, color });
              marker.setPopupContent(carparkPopupHtml(park, v, ll.lat, ll.lng));
            });
          } catch (_) {}
        }, REFRESH_MS);

      } catch (err) {
        console.error('[map]', err);
        document.getElementById('map-loading').style.display = 'none';
        document.getElementById('map-error').classList.remove('hidden');
      }
    }

    loadMapData();
    initSearch();
  </script>
</body>
</html>
