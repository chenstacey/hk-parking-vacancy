<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>停車場列表</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="app.js"></script>
  <style id="shared-style"></style>
  <style>.no-scrollbar{scrollbar-width:none}.no-scrollbar::-webkit-scrollbar{display:none}</style>
</head>
<body class="bg-gray-50 min-h-screen">

  <header class="bg-white border-b border-gray-100 sticky top-0 z-10">
    <div class="max-w-md mx-auto px-4 pt-3 pb-0">
      <div class="flex items-center justify-between mb-2">
        <h1 id="txt-carparks" class="text-base font-bold text-gray-900"></h1>
        <div id="lang-toggle"></div>
      </div>
      <div class="relative mb-2">
        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-300 text-sm">🔍</span>
        <input id="search-input" type="search"
          class="w-full bg-gray-50 border border-gray-200 rounded-xl pl-8 pr-4 py-2 text-sm outline-none focus:border-blue-300 focus:bg-white transition-colors"
          oninput="onSearch()">
      </div>
    </div>
    <!-- Region tabs -->
    <div class="max-w-md mx-auto px-4 flex gap-0 border-b border-gray-100" id="region-tabs"></div>
    <!-- District chips -->
    <div id="district-chips" class="flex gap-2 overflow-x-auto no-scrollbar px-4 py-2"></div>
  </header>

  <main class="max-w-md mx-auto px-4 py-3">
    <p id="result-count" class="text-xs text-gray-400 mb-3"></p>

    <div id="loading" class="space-y-2">
      <div class="bg-white rounded-2xl p-4 flex items-center justify-between">
        <div class="space-y-2 flex-1"><div class="h-3.5 bg-gray-100 rounded w-36 animate-pulse"></div><div class="h-3 bg-gray-100 rounded w-48 animate-pulse"></div></div>
        <div class="h-8 w-12 bg-gray-100 rounded-xl animate-pulse ml-4"></div>
      </div>
      <div class="bg-white rounded-2xl p-4 flex items-center justify-between">
        <div class="space-y-2 flex-1"><div class="h-3.5 bg-gray-100 rounded w-40 animate-pulse"></div><div class="h-3 bg-gray-100 rounded w-52 animate-pulse"></div></div>
        <div class="h-8 w-12 bg-gray-100 rounded-xl animate-pulse ml-4"></div>
      </div>
      <div class="bg-white rounded-2xl p-4 flex items-center justify-between">
        <div class="space-y-2 flex-1"><div class="h-3.5 bg-gray-100 rounded w-32 animate-pulse"></div><div class="h-3 bg-gray-100 rounded w-44 animate-pulse"></div></div>
        <div class="h-8 w-12 bg-gray-100 rounded-xl animate-pulse ml-4"></div>
      </div>
    </div>

    <div id="error" class="hidden bg-red-50 border border-red-100 rounded-2xl p-6 text-center mt-4">
      <p class="text-2xl mb-2">📡</p>
      <p id="txt-load-error" class="text-sm font-semibold text-red-700"></p>
      <p id="txt-check-network" class="text-xs text-red-400 mt-1"></p>
      <button id="txt-retry" onclick="loadData()" class="mt-3 text-xs text-red-500 border border-red-200 rounded-lg px-4 py-1.5"></button>
    </div>

    <div id="carpark-list" class="hidden space-y-2"></div>

    <div id="empty" class="hidden text-center py-12">
      <p class="text-3xl mb-2">🅿️</p>
      <p id="txt-no-results" class="text-sm text-gray-400"></p>
    </div>
  </main>

  <div id="tab-bar"></div>

  <script>
    document.getElementById('shared-style').textContent = SHARED_STYLE;
    document.getElementById('tab-bar').innerHTML = renderTabBar('list');
    document.getElementById('lang-toggle').innerHTML = renderLangToggle();

    // Static i18n
    document.getElementById('txt-carparks').textContent      = t('carparks');
    document.getElementById('search-input').placeholder      = t('searchPlaceholder');
    document.getElementById('txt-load-error').textContent    = t('loadError');
    document.getElementById('txt-check-network').textContent = t('checkNetwork');
    document.getElementById('txt-retry').textContent         = t('retry');
    document.getElementById('txt-no-results').textContent    = t('noResults');
    document.getElementById('result-count').textContent      = t('loading');

    // Build region tabs
    const regionTabsEl = document.getElementById('region-tabs');
    REGIONS.forEach((r, i) => {
      const btn = document.createElement('button');
      btn.dataset.region = r.id;
      btn.onclick = () => selectRegion(btn);
      btn.className = `region-tab flex-1 text-xs font-semibold py-2 border-b-2 ${i === 0 ? 'border-blue-500 text-blue-500' : 'border-transparent text-gray-400'}`;
      btn.textContent = t(r.id);
      regionTabsEl.appendChild(btn);
    });
    // "All" tab
    const allBtn = document.createElement('button');
    allBtn.dataset.region = '';
    allBtn.onclick = () => selectRegion(allBtn);
    allBtn.className = 'region-tab flex-1 text-xs font-semibold py-2 border-b-2 border-transparent text-gray-400';
    allBtn.textContent = t('all');
    regionTabsEl.appendChild(allBtn);

    // ── State ─────────────────────────────────────────────────────────────
    let allInfo        = [];
    let allVacancy     = null;
    let selectedRegion = 'hki';
    let selectedDist   = null;
    let searchQuery    = '';
    let vacancyTimer   = null;

    async function loadData() {
      document.getElementById('error').classList.add('hidden');
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('carpark-list').classList.add('hidden');
      try {
        const [infoJson, vacJson] = await Promise.all([fetchAllInfo(), fetchAllVacancy()]);
        allInfo    = infoJson.car_park || [];
        allVacancy = vacJson;
        buildDistrictChips();
        renderList();
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('carpark-list').classList.remove('hidden');
        clearInterval(vacancyTimer);
        vacancyTimer = setInterval(refreshVacancy, REFRESH_MS);
      } catch (err) {
        console.error(err);
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('error').classList.remove('hidden');
      }
    }

    async function refreshVacancy() {
      try { allVacancy = await fetchAllVacancy(); renderList(); } catch (_) {}
    }

    function selectRegion(btn) {
      selectedRegion = btn.dataset.region;
      selectedDist   = null;
      document.querySelectorAll('.region-tab').forEach(b => {
        const active = b === btn;
        b.className = `region-tab flex-1 text-xs font-semibold py-2 border-b-2 ${active ? 'border-blue-500 text-blue-500' : 'border-transparent text-gray-400'}`;
      });
      buildDistrictChips();
      renderList();
    }

    function buildDistrictChips() {
      const container  = document.getElementById('district-chips');
      const regionDists = getRegionDistricts(selectedRegion);
      if (!regionDists) { container.innerHTML = ''; return; }

      const available = regionDists.filter(d => allInfo.some(p => p.district_en === d));
      container.innerHTML = [
        `<button data-dist="" onclick="selectDistrict(this)"
          class="dist-chip shrink-0 text-xs font-medium px-3 py-1 rounded-full ${!selectedDist ? 'bg-blue-100 text-blue-600' : 'bg-gray-100 text-gray-500'}">
          ${t('allDistricts')}
        </button>`,
        ...available.map(d => `
          <button data-dist="${d}" onclick="selectDistrict(this)"
            class="dist-chip shrink-0 text-xs font-medium px-3 py-1 rounded-full ${selectedDist === d ? 'bg-blue-100 text-blue-600' : 'bg-gray-100 text-gray-500'}">
            ${getLang() === 'en' ? (d) : (DISTRICT_LABELS[d] || d)}
          </button>`)
      ].join('');
    }

    function selectDistrict(btn) {
      selectedDist = btn.dataset.dist || null;
      document.querySelectorAll('.dist-chip').forEach(b => {
        const active = b === btn;
        b.className = `dist-chip shrink-0 text-xs font-medium px-3 py-1 rounded-full ${active ? 'bg-blue-100 text-blue-600' : 'bg-gray-100 text-gray-500'}`;
      });
      renderList();
    }

    function onSearch() {
      searchQuery = document.getElementById('search-input').value;
      renderList();
    }

    function effectiveDistricts() {
      if (selectedDist) return [selectedDist];
      return getRegionDistricts(selectedRegion) || null;
    }

    function renderList() {
      const results = searchCarparks(searchQuery, effectiveDistricts(), allInfo);
      const countEl = document.getElementById('result-count');
      const listEl  = document.getElementById('carpark-list');
      const emptyEl = document.getElementById('empty');

      countEl.textContent = t('countCarparks')(results.length);

      if (results.length === 0) {
        listEl.classList.add('hidden');
        emptyEl.classList.remove('hidden');
        return;
      }
      emptyEl.classList.add('hidden');
      listEl.classList.remove('hidden');

      listEl.innerHTML = results.map(park => {
        const v        = getParkVacancy(park.park_id, allVacancy);
        const style    = v ? vacancyStyle(v.vacancy, v.vacancy_type) : null;
        const isClosed = !v || v.vacancy_type === 'C' || v.vacancy < 0;
        const fav      = isFavourite(park.park_id);

        const badgeHtml = style
          ? `<div class="shrink-0 text-center ml-3">
               <span class="text-2xl font-bold leading-none ${style.num}">${isClosed ? '—' : v.vacancy}</span>
               <p class="text-[10px] ${style.num} mt-0.5">${style.label}</p>
             </div>`
          : `<div class="shrink-0 ml-3 w-10 h-8 bg-gray-100 rounded-xl animate-pulse"></div>`;

        const distLabel = getLang() === 'en' ? (park.district_en || '') : (DISTRICT_LABELS[park.district_en] || park.district_en || '');
        const statusDot = park.opening_status === 'OPEN'
          ? `<span class="w-1.5 h-1.5 rounded-full bg-green-400 inline-block mr-1"></span>`
          : `<span class="w-1.5 h-1.5 rounded-full bg-gray-300 inline-block mr-1"></span>`;
        const favStar = fav ? `<span class="text-yellow-400 text-xs ml-1">★</span>` : '';

        return `
          <a href="detail.html?id=${park.park_id}" class="fade-in bg-white rounded-2xl p-4 flex items-center active:bg-gray-50 transition-colors block">
            <div class="flex-1 min-w-0">
              <p class="text-sm font-semibold text-gray-900 truncate">${parkName(park)}${favStar}</p>
              <p class="text-xs text-gray-400 truncate mt-0.5">${parkAddress(park)}</p>
              <p class="text-xs text-gray-300 mt-1">${statusDot}${distLabel}</p>
            </div>
            ${badgeHtml}
          </a>`;
      }).join('');
    }

    loadData();
  </script>
</body>
</html>
