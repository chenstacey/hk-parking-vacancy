<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#2563eb">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>香港停車場</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="app.js"></script>
  <style id="shared-style"></style>
</head>
<body class="bg-gray-50 min-h-screen">

  <header class="bg-white border-b border-gray-100">
    <div class="max-w-md mx-auto px-4 py-4 flex items-start justify-between">
      <div>
        <p id="txt-region" class="text-xs text-gray-400 font-medium tracking-wide uppercase"></p>
        <h1 id="txt-title" class="text-xl font-bold text-gray-900 mt-0.5"></h1>
      </div>
      <div id="lang-toggle" class="mt-1"></div>
    </div>
  </header>

  <main class="max-w-md mx-auto px-4 py-4 space-y-5">

    <a href="list.html" class="flex items-center gap-3 bg-white rounded-2xl px-4 py-3 shadow-sm active:bg-gray-50 transition-colors">
      <span class="text-gray-300">🔍</span>
      <span id="txt-search-placeholder" class="text-sm text-gray-400"></span>
    </a>

    <div class="grid grid-cols-2 gap-3">
      <a href="list.html" class="bg-blue-500 rounded-2xl p-4 text-white active:bg-blue-600 transition-colors">
        <p class="text-2xl mb-1">☰</p>
        <p id="txt-all-carparks" class="text-sm font-semibold"></p>
        <p id="txt-search-filter" class="text-xs text-blue-200 mt-0.5"></p>
      </a>
      <a href="map.html" class="bg-white rounded-2xl p-4 text-gray-700 shadow-sm active:bg-gray-50 transition-colors">
        <p class="text-2xl mb-1">◎</p>
        <p id="txt-map-view" class="text-sm font-semibold"></p>
        <p id="txt-coming-soon" class="text-xs text-gray-400 mt-0.5"></p>
      </a>
    </div>

    <div>
      <div class="flex items-center justify-between mb-2">
        <h2 id="txt-favourites" class="text-sm font-semibold text-gray-700"></h2>
        <a id="txt-browse-all" href="list.html" class="text-xs text-blue-500"></a>
      </div>
      <div id="fav-loading" class="hidden space-y-2">
        <div class="bg-white rounded-2xl p-4 h-16 animate-pulse"></div>
        <div class="bg-white rounded-2xl p-4 h-16 animate-pulse"></div>
      </div>
      <div id="fav-empty" class="bg-white rounded-2xl p-6 text-center shadow-sm">
        <p class="text-2xl mb-2">🅿️</p>
        <p id="txt-no-fav" class="text-sm text-gray-400"></p>
        <p id="txt-no-fav-hint" class="text-xs text-gray-300 mt-1"></p>
        <a id="txt-browse-carparks" href="list.html" class="inline-block mt-3 text-xs text-blue-500 border border-blue-200 rounded-lg px-4 py-1.5"></a>
      </div>
      <div id="fav-list" class="hidden space-y-2"></div>
    </div>

    <div>
      <h2 id="txt-suggested" class="text-sm font-semibold text-gray-700 mb-2"></h2>
      <div id="suggested-list" class="space-y-2"></div>
    </div>

    <p id="txt-data-source" class="text-center text-xs text-gray-300 pb-6"></p>
  </main>

  <div id="tab-bar"></div>

  <script>
    document.getElementById('shared-style').textContent = SHARED_STYLE;
    document.getElementById('tab-bar').innerHTML = renderTabBar('home');
    document.getElementById('lang-toggle').innerHTML = renderLangToggle();

    // Apply i18n strings
    document.getElementById('txt-region').textContent           = t('hk');
    document.getElementById('txt-title').textContent            = t('appTitle');
    document.getElementById('txt-search-placeholder').textContent = t('searchPlaceholder');
    document.getElementById('txt-all-carparks').textContent     = t('allCarparks');
    document.getElementById('txt-search-filter').textContent    = t('searchFilter');
    document.getElementById('txt-map-view').textContent         = t('mapView');
    document.getElementById('txt-coming-soon').textContent      = t('comingSoon');
    document.getElementById('txt-favourites').textContent       = t('favourites');
    document.getElementById('txt-browse-all').textContent       = t('browseAll');
    document.getElementById('txt-no-fav').textContent           = t('noFavourites');
    document.getElementById('txt-no-fav-hint').textContent      = t('noFavHint');
    document.getElementById('txt-browse-carparks').textContent  = t('browseCarparks');
    document.getElementById('txt-suggested').textContent        = t('suggested');
    document.getElementById('txt-data-source').textContent      = t('dataSource');

    const SUGGESTED = [
      { id: 'tdc114p1' },
      { id: 'tdcp5'    },
      { id: 'tdcp7'    },
    ];

    async function loadSuggested() {
      const listEl = document.getElementById('suggested-list');
      // Show skeletons first
      listEl.innerHTML = SUGGESTED.map(p => `
        <div class="bg-white rounded-2xl p-4 flex items-center justify-between shadow-sm">
          <div class="space-y-2 flex-1">
            <div class="h-3.5 bg-gray-100 rounded w-36 animate-pulse"></div>
            <div class="h-3 bg-gray-100 rounded w-48 animate-pulse"></div>
          </div>
          <div class="h-8 w-10 bg-gray-100 rounded-xl animate-pulse ml-3"></div>
        </div>`).join('');

      try {
        const [infoJson, vacJson] = await Promise.all([fetchAllInfo(), fetchAllVacancy()]);
        const allParks = infoJson.car_park || [];
        listEl.innerHTML = SUGGESTED.map(p => {
          const park = allParks.find(q => q.park_id === p.id);
          if (!park) return '';
          const v      = getParkVacancy(p.id, vacJson);
          const style  = v ? vacancyStyle(v.vacancy, v.vacancy_type) : null;
          const closed = !v || v.vacancy_type === 'C' || v.vacancy < 0;
          const badge  = style
            ? `<div class="shrink-0 ml-3 text-center">
                 <span class="text-xl font-bold leading-none ${style.num}">${closed ? '—' : v.vacancy}</span>
                 <p class="text-[10px] ${style.num} mt-0.5">${style.label}</p>
               </div>`
            : '';
          return `
            <a href="detail.html?id=${p.id}" class="fade-in bg-white rounded-2xl p-4 flex items-center shadow-sm active:bg-gray-50 transition-colors block">
              <div class="flex-1 min-w-0">
                <p class="text-sm font-semibold text-gray-900 truncate">${parkName(park)}</p>
                <p class="text-xs text-gray-400 truncate mt-0.5">${parkAddress(park)}</p>
              </div>${badge}
            </a>`;
        }).join('');
      } catch (_) {}
    }

    async function loadFavourites() {
      const favIds     = getFavourites();
      const favEmptyEl = document.getElementById('fav-empty');
      const favListEl  = document.getElementById('fav-list');
      const favLoadEl  = document.getElementById('fav-loading');

      if (favIds.length === 0) {
        favEmptyEl.classList.remove('hidden');
        return;
      }
      favEmptyEl.classList.add('hidden');
      favLoadEl.classList.remove('hidden');

      try {
        const [infoJson, vacJson] = await Promise.all([fetchAllInfo(), fetchAllVacancy()]);
        const allParks = infoJson.car_park || [];
        favLoadEl.classList.add('hidden');
        favListEl.classList.remove('hidden');
        favListEl.innerHTML = favIds.map(id => {
          const park = allParks.find(p => p.park_id === id);
          if (!park) return '';
          const v      = getParkVacancy(id, vacJson);
          const style  = v ? vacancyStyle(v.vacancy, v.vacancy_type) : null;
          const closed = !v || v.vacancy_type === 'C' || v.vacancy < 0;
          const badge  = style
            ? `<div class="shrink-0 ml-3 text-center">
                 <span class="text-2xl font-bold leading-none ${style.num}">${closed ? '—' : v.vacancy}</span>
                 <p class="text-[10px] ${style.num} mt-0.5">${style.label}</p>
               </div>`
            : '';
          return `
            <a href="detail.html?id=${id}" class="fade-in bg-white rounded-2xl p-4 flex items-center shadow-sm active:bg-gray-50 transition-colors block">
              <div class="flex-1 min-w-0">
                <p class="text-sm font-semibold text-gray-900 truncate">★ ${parkName(park)}</p>
                <p class="text-xs text-gray-400 truncate mt-0.5">${parkAddress(park)}</p>
              </div>${badge}
            </a>`;
        }).join('');
      } catch (_) {
        favLoadEl.classList.add('hidden');
        favEmptyEl.classList.remove('hidden');
      }
    }

    loadFavourites();
    loadSuggested();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
